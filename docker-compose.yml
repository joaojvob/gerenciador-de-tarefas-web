version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: gte_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gte_network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gte_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-gerenciador_tarefas}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gte_network

  db:
    image: mysql:8.0
    container_name: gte_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gerenciador_tarefas}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gte_network

  redis:
    image: redis:alpine
    container_name: gte_redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - gte_network

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gte_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - gte_network

networks:
  gte_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
